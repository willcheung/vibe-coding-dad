<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Complete — Vibe Coding Dad</title>
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-neutral-800 min-h-screen flex flex-col">

    <header class="w-full py-6 px-6 md:px-12 border-b border-neutral-200 bg-white/85 backdrop-blur-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="font-bold text-xl tracking-tight text-neutral-900 flex items-center gap-2 hover:opacity-80 transition-opacity">
                <i class="fa-solid fa-terminal text-orange-500"></i>
                VIBE CODING DAD
            </a>
        </div>
    </header>

    <main class="flex-grow pt-20 pb-16 px-6 lg:px-12">
        <div class="max-w-[520px] mx-auto text-center">
            <div class="rounded-2xl p-8 bg-neutral-50 border border-neutral-200">
                <div class="text-3xl mb-3 text-{{ accent }}-500">&#x2713;</div>
                <h1 class="text-xl font-bold text-neutral-900">Purchase complete</h1>
                <p class="text-sm text-neutral-600 mt-2 leading-relaxed">
                    Thanks for buying <strong class="text-neutral-900">{{ product_name }}</strong>.
                    You'll also get an email with your download link.
                </p>

                <div id="download-area" class="mt-5">
                    <p id="dl-loading" class="text-xs text-neutral-500 font-mono">Verifying purchase...</p>
                </div>
            </div>

            <a href="/#play" class="inline-block mt-6 text-sm font-mono text-neutral-500 hover:text-neutral-900 transition-colors">
                &larr; Back to projects
            </a>
        </div>
    </main>

    <script>
    (async function() {
        const area = document.getElementById('download-area');
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');

        if (!sessionId) {
            area.innerHTML = '<p class="text-sm text-neutral-600 mt-3">No session found. Contact <a href="mailto:support@vibecodingdad.com" class="text-orange-600 hover:underline">support@vibecodingdad.com</a>.</p>';
            return;
        }

        try {
            const res = await fetch('/api/checkout/verify?session_id=' + sessionId);
            const data = await res.json();
            if (data.downloadUrl) {
                area.innerHTML = '<a href="' + data.downloadUrl + '" class="inline-block mt-3 bg-orange-500 hover:bg-orange-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-[3px_3px_0_0_rgba(23,23,23,0.9)] hover:-translate-y-0.5 transition-all">Download {{ product_name }}</a>';
            } else {
                area.innerHTML = '<p class="text-sm text-neutral-600 mt-3">' + (data.error || 'Could not verify purchase.') + ' Contact <a href="mailto:support@vibecodingdad.com" class="text-orange-600 hover:underline">support@vibecodingdad.com</a>.</p>';
            }
        } catch {
            area.innerHTML = '<p class="text-sm text-neutral-600 mt-3">Something went wrong. Contact <a href="mailto:support@vibecodingdad.com" class="text-orange-600 hover:underline">support@vibecodingdad.com</a>.</p>';
        }
    })();
    </script>
</body>
</html>
